name: Deploy Portfolio to AWS EC2

# Trigger deployment run - secret configured
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      # Step 1: Decode the base64 SSH key into a secure file on the runner
      - name: Decode SSH Deploy Key
        run: |
          echo "${{ secrets.EC2_SSH_KEY_B64 }}" | base64 --decode > /tmp/ssh_key
          chmod 600 /tmp/ssh_key

      # Step 2: Use the decoded key path to run the deployment script
      - name: Deploy via SSH connection
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key_path: /tmp/ssh_key
          port: 22
          script: |
            # Load Node environment paths
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            export PATH="$HOME/.local/share/pnpm:$PATH"

            # Pull and reload
            cd portfolio
            git pull origin main
            pnpm install
            pnpm build
            pm2 reload portfolio
